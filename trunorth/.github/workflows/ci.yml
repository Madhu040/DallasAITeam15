name: ci
on: [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run validate:content
      - run: npm run test:unit
      - run: npm run build
      # DoD §27 item 3 names the Playwright offline test explicitly. Runs against the
      # production build served by vite preview (see playwright.config.ts webServer).
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: trunorth/playwright-report/
          retention-days: 7
