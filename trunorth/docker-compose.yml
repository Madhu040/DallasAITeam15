services:
  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_PATH: /app/data/trunorth.db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - trunorth_data:/app/data

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  trunorth_data:
